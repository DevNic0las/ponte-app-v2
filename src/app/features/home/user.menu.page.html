<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="ponte-logo">Ponte</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="user-menu-content">

  <!-- Header Section -->
  <div class="page-header">
    <span class="label-tag">Novo Chamado</span>
    <h1 class="page-title">MEU ATENDIMENTO</h1>
  </div>

  <!-- Action Cards -->
  <div class="action-list">
    <ion-card
      *ngFor="let action of actions"
      class="action-card"
      button
      (click)="navigate(action.route)"
    >
      <ion-card-content>
        <div class="card-inner">
          <div class="icon-wrapper">
            <ion-icon [name]="action.icon"></ion-icon>
          </div>
          <div class="card-text">
            <h2 class="card-title">{{ action.title }}</h2>
            <p class="card-description">{{ action.description }}</p>
          </div>
          <ion-icon name="chevron-forward-outline" class="chevron"></ion-icon>
        </div>
      </ion-card-content>
    </ion-card>
  </div>

  <!-- Info Box -->
  <div class="info-box">
    <p class="info-label">Central de Ajuda</p>
    <p class="info-text">
      Escolha a categoria que melhor descreve sua necessidade. O tempo médio de
      resposta para chamados de nível crítico é de 2 horas úteis.
    </p>
  </div>

</ion-content>

<app-bottom-nav></app-bottom-nav>
