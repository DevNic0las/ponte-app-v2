<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button text="" defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Perfil do Colaborador</ion-title>
    <ion-buttons slot="end">
      <div class="w-8"></div>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="profile-content" *ngIf="profile$ | async as profile">
  <div class="profile-hero">
    <div class="avatar-wrapper">
      <ion-avatar class="profile-avatar">
        <img [src]="selectedAvatar() || profile.avatar || mockAvatars[0]" [alt]="profile.name" />
      </ion-avatar>
      <button class="edit-fab ion-activatable" (click)="showAvatarPicker.set(true)">
        <ion-ripple-effect></ion-ripple-effect>
        <ion-icon name="create-outline"></ion-icon>
      </button>
    </div>
    <div class="profile-info">
      <span class="role-badge">Colaborador</span>
      <h1 class="profile-name">{{ profile.name }}</h1>
      <div class="profile-meta">
        <p class="profile-department">{{ profile.sector }}</p>
        <p class="profile-role-label">{{ profile.role }}</p>
      </div>
    </div>
  </div>

  <!-- Avatar Picker -->
  <div class="avatar-picker-overlay" *ngIf="showAvatarPicker()" (click)="showAvatarPicker.set(false)">
    <div class="avatar-picker-sheet" (click)="$event.stopPropagation()">
      <p class="picker-title">Escolha um avatar</p>
      <div class="avatar-grid">
        <button
          *ngFor="let avatar of mockAvatars"
          class="avatar-option"
          [class.selected]="selectedAvatar() === avatar"
          (click)="selectAvatar(avatar)"
        >
          <img [src]="avatar" />
        </button>
      </div>
    </div>
  </div>

  <ion-card class="info-card">
    <ion-card-content>
      <p class="card-section-label">Informações de Acesso</p>
      <ion-item lines="none" class="info-item">
        <div class="info-icon-wrap" slot="start">
          <ion-icon name="mail-outline"></ion-icon>
        </div>
        <ion-label>
          <p class="info-label">E-mail Corporativo</p>
          <h3 class="info-value">{{ profile.email }}</h3>
        </ion-label>
      </ion-item>
      <ion-item lines="none" class="info-item">
        <div class="info-icon-wrap" slot="start">
          <ion-icon name="business-outline"></ion-icon>
        </div>
        <ion-label>
          <p class="info-label">Departamento</p>
          <h3 class="info-value">{{ profile.sector }}</h3>
        </ion-label>
      </ion-item>
    </ion-card-content>
  </ion-card>

  <ion-card class="info-card prefs-card">
    <ion-card-content class="ion-no-padding">
      <div class="card-header-row">
        <p class="card-section-label">Preferências</p>
      </div>
      <ion-item button detail="false" lines="full" class="pref-item" (click)="onNotifications()">
        <div class="info-icon-wrap" slot="start">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>
        <ion-label>Notificações</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="chevron"></ion-icon>
      </ion-item>
      <ion-item button detail="false" lines="none" class="pref-item" (click)="onPrivacy()">
        <div class="info-icon-wrap" slot="start">
          <ion-icon name="lock-closed-outline"></ion-icon>
        </div>
        <ion-label>Privacidade e Segurança</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="chevron"></ion-icon>
      </ion-item>
      <div class="divider"></div>
      <ion-item button detail="false" lines="none" class="pref-item logout-item" (click)="onLogout()">
        <div class="info-icon-wrap logout-icon-wrap" slot="start">
          <ion-icon name="log-out-outline"></ion-icon>
        </div>
        <ion-label class="logout-label">Sair da Conta</ion-label>
      </ion-item>
    </ion-card-content>
  </ion-card>
</ion-content>

<app-bottom-nav></app-bottom-nav>
